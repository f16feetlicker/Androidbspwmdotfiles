# 🖤 Background
#background #050505
#foreground #c7c7c7

# 🔴 Cursor
cursor #3a6ea5
cursor_text_color #ffffff

# 🔴 Selection
selection_background #3a6ea5
selection_foreground #000000

# ⚙️ Borders / window
window_border_width 1
active_border_color #3a6ea5
inactive_border_color #1a1a1a

# 🧠 Font
font_family EnvyCodeR Nerd Font
font_size 11.0

# 🔥 Transparency (optional, looks nice with your wallpaper)
background_opacity 0.5

# 🧩 Padding (makes it look clean)
window_padding_width 8

