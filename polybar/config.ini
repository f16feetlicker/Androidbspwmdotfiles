include-file = ~/.config/polybar/colors.ini

[bar/bar1]
width = 13.5%
height = 20pt
offset-x = 0%
alignment = left
radius = 7

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = ${coloes.blue}

padding-left = 0
padding-right = 125

module-margin = 1

separator = 
separator-foreground = ${colors.m_blue}

font-0 = monospace;2

modules-left = xworkspaces xwindow
#modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[bar/bar2]
width = 5%
height = 20pt
radius = 7
offset-x = 93%
offset-y = 0%
alignement = center
; dpi = 96

background = ${colors.background}
foreground = ${colors.m_blue}

line-size = 3pt
border-size = 4pt
border-color = 
padding-left = 0
padding-right = 0
module-margin = 1
separator = |
separator-foreground = ${colors.dim_red}

font-0 = EnvyCodeR Nerd Font:style=Regular

modules-center =  pulseaudio

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
[bar/cpu]
width = 5%
height = 20pt
radius = 7
offset-x = 87.5%
offset-y = 0%
alignement = center
; dpi = 96

background = ${colors.background}
foreground = ${colors.white}

line-size = 3pt
border-size = 4pt
border-color = 
padding-left = 0
padding-right = 0
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

font-0 = fantasque-sans-mono-regular-nerd-font
font-1 = EnvyCodeR Nerd Font:style=Regular
modules-center = memory

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


[bar/hour]
width = 5%
height = 20pt
radius = 7
offset-x = 15%
offset-y = 1.2%
alignement = center
; dpi = 96

background = ${colors.white}
foreground = ${colors.m_blue}

line-size = 3pt
border-size = 0pt
border-color =
padding-left = 0
padding-right = 0
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

font-0 = fantasque-sans-mono-regular-nerd-font
font-1 = EnvyCodeR Nerd Font:style=Regular:size=14
modules-center = hour

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


[bar/date]
width = 7.5%
height = 18pt
radius = 7
offset-x = 79.5%
offset-y = 0%
alignement = center
; dpi = 96

background = ${colors.white}
foreground = ${colors.m_blue}

line-size = 3pt
border-size = 4pt
border-color =
padding-left = 0
padding-right = 0
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

font-0 = fantasque-sans-mono-regular-nerd-font
font-1 = EnvyCodeR Nerd Font:style=Regular size=14;2
modules-center = date

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
[bar/window]
width = 20%
height = 20pt
radius = 8
offset-x = 40%
offset-y = 1%
alignement = center
; dpi = 96

background = ${colors.black}
foreground = ${colors.cyan}

line-size = 3pt
border-size = 0pt
border-color = 
padding-left = 0
padding-right = 0
module-margin = 1
separator = |
separator-foreground = ${colors.dim_red}

font-0 = EnvyCodeR Nerd Font:style=Regular

modules-center =  xwindow
fixed-center = true
cursor-click = pointer
cursor-scroll = ns-resize
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.gray}
label-active-underline= ${colors.white}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.cyan}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-maxlen = 40

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

label-active-font = 0

format-volume-prefix = "ÔÄ®"
format-volume-prefix-foreground = ${colors.white}
format-volume = <label-volume>

label-volume = %percentage%%
label-volume-foreground = ${colors.white}
label-muted = mt
label-muted-foreground = ${colors.white}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
label-active-font = 1
format-prefix = "ÓČ¶  "
format-prefix-foreground = ${colors.white}
label = %percentage_used:2%%
label-foreground = ${colors.white}
[module/cpu]
type = internal/cpu
interval = 2
label-active-font = 0
format-prefix = "CPU "
format-prefix-foreground = ${colors.blue}
label = %percentage%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/hour]
type = internal/date
interval = 1
format-prefix = "ÔÄó "
format-prefix-foreground = ${colors.cyan} 

date = %H:%M
date-alt = %Y-%m-%d 
label-active-font = 1
label = %date%
label-foreground = ${colors.cyan}
label-padding-left = 1 
[module/minute]
type = internal/date
interval = 1
 
date = %M

label = %date%
label-foreground = ${colors.white}
 
[module/date]
type = internal/date
interval = 1
date = %Y/%m/%d
label = %date%
label-foreground = ${colors.cyan} 
[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
